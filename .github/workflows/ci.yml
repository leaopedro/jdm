name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jdm
          POSTGRES_PASSWORD: jdm
          POSTGRES_DB: jdm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U jdm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://jdm:jdm@localhost:5432/jdm?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @jdm/db db:generate

      - run: pnpm --filter @jdm/db exec prisma migrate deploy

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

  expo-prebuild-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.4.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jdm/mobile typecheck
      - run: pnpm --filter @jdm/mobile exec expo config --type public
